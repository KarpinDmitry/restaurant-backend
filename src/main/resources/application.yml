spring:
  application:
    name: restaurant-backend

  # PostgreSQL подключение
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate настройки
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Docker Compose (автозапуск контейнеров)
  docker:
    compose:
      enabled: true
      file: docker-compose.yml

# Сервер
server:
  port: 8080

# JWT настройки
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 часа в миллисекундах

# Spring Security
spring.security:
  filter:
    order: -100

# Swagger / OpenAPI настройки
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

# Логирование
logging:
  level:
    root: INFO
    ru.karpin: DEBUG
    org.springframework.security: DEBUG
