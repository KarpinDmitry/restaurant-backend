spring.application.name=restaurant-backend

  # PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/restaurant
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

  # JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

  # Docker Compose
spring.docker.compose.enabled=true
spring.docker.compose.file=docker-compose.yml

  # Server
server.port=8080

  # Jackson - snake_case to match OpenAPI spec (status_name, first_name, total_price, ...)
spring.jackson.property-naming-strategy=SNAKE_CASE

  # Multipart (file uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

  # Uploaded files
app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.url-prefix=/uploads

  # JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refresh-expiration=604800000

  # Spring Security
spring.security.filter.order=-100

  # Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.show-actuator=false

  # Logging
logging.level.root=INFO
logging.level.ru.karpin=DEBUG
logging.level.org.springframework.security=DEBUG

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true